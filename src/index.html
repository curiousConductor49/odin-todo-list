<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="./assets/cat.svg">
    <title>Meowmos: A Purrsonalized Todo App</title>
</head>
<body>
    <main>
        <section id="app-dashboard">
            <h1>meowmos: organize your day one task at a time</h1>
            <aside id="control-panel">
                <div class="new-btns-container">
                    <h2>make a meow</h2>
                    <button id="new-item-btn">New meow</button>
                    <button id="new-list-btn">New purr</button>
                </div>
                <div class="view-options-container">
                    <h2>choose your view</h2>
                    <button id="all-items-btn">All meows</button>
                    <button id="all-lists-btn">All purrs</button>
                    <label for="todo-list-dropdown">Pick a Purr:</label>
                    <select name="todo-list-dropdown" id="todo-list-dropdown"></select>
                </div>
            </aside>
            <section id="displays-container">
                <div class="data-display" id="todo-items-display"></div>
                <div class="data-display" id="todo-lists-display"></div>
                <div class="data-display" id="selected-todo-list-display">
                </div>
            </section>
            <section id="forms-container">
                <dialog id="form-dialog">
                    <form id="create-new" class="hide"></form>
                    <form id="update-existing" class="hide"></form>
                </dialog>
            </section>
        </section>
    </main>
    <script src="index.js" type="module"></script>
</body>
</html>
