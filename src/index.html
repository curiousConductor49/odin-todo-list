<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section id="app-dashboard">
            <h1>Meowmos, the todo app with cats</h1>
            <aside id="control-panel">
                <div class="new-btns-container">
                    <h2>Make something new!</h2>
                    <button id="new-item-btn">New item</button>
                    <button id="new-list-btn">New list</button>
                </div>
                <div class="view-options-container">
                    <h2>View Options</h2>
                    <button id="all-items-btn">All items</button>
                    <button id="all-lists-btn">All lists</button>
                    <label for="todo-list-dropdown">Specific List</label>
                    <select name="todo-list-dropdown" id="todo-list-dropdown"></select>
                </div>
            </aside>
            <section id="displays-container">
                <div class="data-display" id="todo-items-display"></div>
                <div class="data-display" id="todo-lists-display"></div>
                <div class="data-display" id="single-todo-list-display">
                    <p id="placeholder">Meow, meow, meow!</p>
                </div>
            </section>
            <section id="forms-container">
                <dialog id="form-dialog">
                    <form id="create-new" class="hide"></form>
                    <form id="update-existing" class="hide"></form>
                </dialog>
            </section>
        </section>
    </main>
    <script src="index.js" type="module"></script>
</body>
</html>
